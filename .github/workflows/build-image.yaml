name: Build and push docker image

on:
  push:
    branches:
      - main
      - develop
      - nuxt
    tags:
      - '**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    # Specify which environment to use for secrets
    # nuxt branch → Preview environment
    # main branch → Production environment
    # develop branch → Production environment (fallback)
    environment: ${{ github.ref == 'refs/heads/nuxt' && 'Preview' || (github.ref == 'refs/heads/main' && 'Production' || 'Production') }}

    env:
      JUJU_IMAGE_TAG: ${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
      DOCKER_IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          echo "=== VALIDATING REQUIRED SECRETS ==="
          echo "Environment: ${{ github.ref == 'refs/heads/nuxt' && 'Preview' || (github.ref == 'refs/heads/main' && 'Production' || 'Production') }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          
          MISSING_SECRETS=0
          
          # Check DEX secrets
          if [ -z "${{ secrets.NUXT_DEX_HOST }}" ]; then
            echo "❌ CRITICAL: NUXT_DEX_HOST is NOT set"
            MISSING_SECRETS=$((MISSING_SECRETS + 1))
          else
            echo "✅ NUXT_DEX_HOST is set (length: ${#NUXT_DEX_HOST})"
          fi
          
          if [ -z "${{ secrets.NUXT_DEX_USERNAME }}" ]; then
            echo "❌ CRITICAL: NUXT_DEX_USERNAME is NOT set"
            MISSING_SECRETS=$((MISSING_SECRETS + 1))
          else
            echo "✅ NUXT_DEX_USERNAME is set (length: ${#NUXT_DEX_USERNAME})"
          fi
          
          if [ -z "${{ secrets.NUXT_DEX_PASSWORD }}" ]; then
            echo "❌ CRITICAL: NUXT_DEX_PASSWORD is NOT set"
            MISSING_SECRETS=$((MISSING_SECRETS + 1))
          else
            echo "✅ NUXT_DEX_PASSWORD is set (length: ${#NUXT_DEX_PASSWORD})"
          fi
          
          if [ -z "${{ vars.NUXT_PUBLIC_API_BASE }}" ]; then
            echo "⚠️  WARNING: NUXT_PUBLIC_API_BASE is NOT set (will use default: /apidev)"
          else
            echo "✅ NUXT_PUBLIC_API_BASE is set"
          fi
          
          # Check optional secrets
          if [ -z "${{ secrets.NUXT_DEX_AUTH_TYPE }}" ]; then
            echo "⚠️  WARNING: NUXT_DEX_AUTH_TYPE is NOT set (will use default: local)"
          else
            echo "✅ NUXT_DEX_AUTH_TYPE is set"
          fi
          
          if [ -z "${{ secrets.NUXT_PUBLIC_API_REMOTE }}" ]; then
            echo "⚠️  WARNING: NUXT_PUBLIC_API_REMOTE is NOT set (will use NUXT_PUBLIC_API_BASE)"
          else
            echo "✅ NUXT_PUBLIC_API_REMOTE is set"
          fi
          
          if [ -z "${{ vars.NUXT_PUBLIC_API_RUNS }}" ]; then
            echo "⚠️  WARNING: NUXT_PUBLIC_API_RUNS is NOT set (will use default)"
          else
            echo "✅ NUXT_PUBLIC_API_RUNS is set"
          fi

          if [ -z "${{ vars.NUXT_PUBLIC_FEDERATED_ENABLED }}" ]; then
            echo "⚠️  WARNING: NUXT_PUBLIC_FEDERATED_ENABLED is NOT set (will use default: false)"
          else
            echo "✅ NUXT_PUBLIC_FEDERATED_ENABLED is set to: ${{ vars.NUXT_PUBLIC_FEDERATED_ENABLED }}"
          fi

          echo ""
          if [ $MISSING_SECRETS -gt 0 ]; then
            echo "❌❌❌ BUILD FAILED ❌❌❌"
            echo "$MISSING_SECRETS critical secret(s) are missing!"
            echo ""
            echo "Please set the missing secrets in:"
            echo "Repository → Settings → Secrets and variables → Actions → Environments → ${{ github.ref == 'refs/heads/nuxt' && 'Preview' || (github.ref == 'refs/heads/main' && 'Production' || 'Production') }}"
            echo ""
            exit 1
          fi
          
          echo "✅ All critical secrets are set"
        env:
          NUXT_DEX_HOST: ${{ secrets.NUXT_DEX_HOST }}
          NUXT_DEX_USERNAME: ${{ secrets.NUXT_DEX_USERNAME }}
          NUXT_DEX_PASSWORD: ${{ secrets.NUXT_DEX_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64, linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub as ${{ vars.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Make versions
        run: |
          chmod +x ./tools/version.sh
          ./tools/version.sh "${{ github.sha }}" "${{ env.DOCKER_IMAGE_NAME }}"
          echo "APP_VERSION=$(cat "./VERSION")" >> $GITHUB_ENV
          echo "DOCKER_IMAGES=$(cat "./DOCKER_IMAGES")" >> $GITHUB_ENV
          echo "DOCKER_TAGS=$(cat "./VERSION_DOCKER")" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: ${{ env.DOCKER_TAGS }}

      - name: Push docker image with version
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.DOCKER_IMAGES }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64, linux/arm64
          secrets: |
            dex_username=${{ secrets.NUXT_DEX_USERNAME }}
            dex_password=${{ secrets.NUXT_DEX_PASSWORD }}
          build-args: |
            NUXT_COG_APP_VERSION=${{ vars.NUXT_COG_APP_VERSION }}
            NUXT_DEX_HOST=${{ secrets.NUXT_DEX_HOST }}
            NUXT_DEX_AUTH_TYPE=${{ secrets.NUXT_DEX_AUTH_TYPE }}
            NUXT_DEX_SKIP_TLS_VERIFY=${{ secrets.NUXT_DEX_SKIP_TLS_VERIFY }}
            NUXT_PUBLIC_API_BASE=${{ vars.NUXT_PUBLIC_API_BASE }}
            NUXT_PUBLIC_API_REMOTE=${{ secrets.NUXT_PUBLIC_API_REMOTE }}
            NUXT_PUBLIC_API_RUNS=${{ vars.NUXT_PUBLIC_API_RUNS }}
            NUXT_PUBLIC_FEDERATED_ENABLED=${{ vars.NUXT_PUBLIC_FEDERATED_ENABLED }}
            URL_PREFIX=${{ vars.URL_PREFIX }}

      #      - name: Push docker image for Juju
      #        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      #        uses: docker/build-push-action@v6
      #        with:
      #          push: true
      #          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.JUJU_IMAGE_TAG }}
      #          platforms: linux/amd64, linux/arm64

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create a github release
        run: gh release create "${{ env.APP_VERSION }}"
        env:
          GH_TOKEN: ${{ github.token }}
          NUXT_COG_APP_VERSION: ${{ vars.NUXT_COG_APP_VERSION }}

      - name: Publish Helm charts
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ github.token }}
          target_dir: './helm-charts/'
      # <<< ADDED: export image_name and image_tag as outputs
      - name: Set build outputs
        id: set_output
        run: |
          echo "image_name=${{ env.DOCKER_IMAGE_NAME }}" >> $GITHUB_OUTPUT   # <<< ADDED
          # <<< CHANGED: use DOCKER_TAGS instead of APP_VERSION
          DOCKER_TAG=$(echo "${{ env.DOCKER_TAGS }}" | cut -d',' -f1)
          echo "image_tag=${DOCKER_TAG}" >> $GITHUB_OUTPUT         # <<< CHANGED

    outputs:
      image_name: ${{ steps.set_output.outputs.image_name }} # <<< ADDED
      image_tag: ${{ steps.set_output.outputs.image_tag }} # <<< ADDED

  update-resource:
    needs: build
    runs-on: ubuntu-latest

    container:
      image: hiroregistry/juju-cd:latest

    env:
      JUJU_API_ENDPOINTS: ${{ secrets.JUJU_API_ENDPOINTS }}
      # <<< CHANGED: use build outputs instead of digest
      JUJU_RESOURCE_IMAGE: docker.io/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.image_tag }} # <<< UPDATED
      JUJU_APP_NAME: ${{ vars.JUJU_APP_NAME }}
      JUJU_RESOURCE_NAME: ${{ vars.JUJU_RESOURCE_NAME }}
      JUJU_CON: ${{ vars.JUJU_CONTROLLER }}
      JUJU_USERNAME: ${{ secrets.JUJU_USERNAME }}
      JUJU_PASSWORD: ${{ secrets.JUJU_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set JUJU_APP_NAME dynamically
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "JUJU_APP_NAME=${{ vars.JUJU_APP_NAME }}" >> $GITHUB_ENV
          else
            echo "JUJU_APP_NAME=${{ vars.JUJU_APP_NAME }}-dev" >> $GITHUB_ENV
          fi

      - name: Handle Conditional CA Cert
        id: set_ca_cert
        run: |
          if [ -n "${{ secrets.JUJU_CA_CERT }}" ]; then
            echo "JUJU_CA_CERT=${{ secrets.JUJU_CA_CERT }}" >> $GITHUB_ENV
          fi

      - name: Updating destination Model
        shell: bash
        run: |
          export HOME=/root
          /usr/local/bin/entrypoint.sh
          juju switch kubeflow
          echo "Switched to kubeflow model."
          echo "Attaching resource to Juju application using tag..."
          juju attach-resource $JUJU_APP_NAME $JUJU_RESOURCE_NAME=$JUJU_RESOURCE_IMAGE
