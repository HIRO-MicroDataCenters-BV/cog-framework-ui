name: Build and push docker image

on:
  push:
    branches:
      - main
      - develop
      - nuxt
    tags:
      - '**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest

    env:
      JUJU_IMAGE_TAG: ${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
      DOCKER_IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64, linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub as ${{ vars.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Make versions
        run: |
          chmod +x ./tools/version.sh
          ./tools/version.sh "${{ github.sha }}" "${{ env.DOCKER_IMAGE_NAME }}"
          echo "APP_VERSION=$(cat "./VERSION")" >> $GITHUB_ENV
          echo "DOCKER_IMAGES=$(cat "./DOCKER_IMAGES")" >> $GITHUB_ENV
          echo "DOCKER_TAGS=$(cat "./VERSION_DOCKER")" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: ${{ env.DOCKER_TAGS }}

      - name: Push docker image with version
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.DOCKER_IMAGES }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64, linux/arm64
          build-args: |
            NUXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }}

      #      - name: Push docker image for Juju
      #        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
      #        uses: docker/build-push-action@v6
      #        with:
      #          push: true
      #          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.JUJU_IMAGE_TAG }}
      #          platforms: linux/amd64, linux/arm64

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create a github release
        run: gh release create "${{ env.APP_VERSION }}"
        env:
          GH_TOKEN: ${{ github.token }}
          NUXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}

      - name: Publish Helm charts
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ github.token }}
          target_dir: './helm-charts/'
      # <<< ADDED: export image_name and image_tag as outputs
      - name: Set build outputs
        id: set_output
        run: |
          echo "image_name=${{ env.DOCKER_IMAGE_NAME }}" >> $GITHUB_OUTPUT   # <<< ADDED
          # <<< CHANGED: use DOCKER_TAGS instead of APP_VERSION
          DOCKER_TAG=$(echo "${{ env.DOCKER_TAGS }}" | cut -d',' -f1)
          echo "image_tag=${DOCKER_TAG}" >> $GITHUB_OUTPUT         # <<< CHANGED

    outputs:
      image_name: ${{ steps.set_output.outputs.image_name }} # <<< ADDED
      image_tag: ${{ steps.set_output.outputs.image_tag }} # <<< ADDED

  update-resource:
    needs: build
    runs-on: ubuntu-latest

    container:
      image: hiroregistry/juju-cd:latest

    env:
      JUJU_API_ENDPOINTS: ${{ secrets.JUJU_API_ENDPOINTS }}
      # <<< CHANGED: use build outputs instead of digest
      JUJU_RESOURCE_IMAGE: docker.io/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.image_tag }} # <<< UPDATED
      JUJU_APP_NAME: ${{ vars.JUJU_APP_NAME }}
      JUJU_RESOURCE_NAME: ${{ vars.JUJU_RESOURCE_NAME }}
      JUJU_CON: ${{ vars.JUJU_CONTROLLER }}
      JUJU_USERNAME: ${{ secrets.JUJU_USERNAME }}
      JUJU_PASSWORD: ${{ secrets.JUJU_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set JUJU_APP_NAME dynamically
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "JUJU_APP_NAME=${{ vars.JUJU_APP_NAME }}" >> $GITHUB_ENV
          else
            echo "JUJU_APP_NAME=${{ vars.JUJU_APP_NAME }}-dev" >> $GITHUB_ENV
          fi

      - name: Handle Conditional CA Cert
        id: set_ca_cert
        run: |
          if [ -n "${{ secrets.JUJU_CA_CERT }}" ]; then
            echo "JUJU_CA_CERT=${{ secrets.JUJU_CA_CERT }}" >> $GITHUB_ENV
          fi

      - name: Updating destination Model
        shell: bash
        run: |
          export HOME=/root
          /usr/local/bin/entrypoint.sh
          juju switch kubeflow
          echo "Switched to kubeflow model."
          echo "Attaching resource to Juju application using tag..."
          juju attach-resource $JUJU_APP_NAME $JUJU_RESOURCE_NAME=$JUJU_RESOURCE_IMAGE
